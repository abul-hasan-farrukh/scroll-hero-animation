<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scroll Showcase</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:#87CEEB;
  color:#111;
  overflow-x:hidden;
}

.scroll-wrapper{
  height:200vh;
  position:relative;
}

.hero-container{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(to bottom,#87CEEB,#6bb7e6);
  overflow:hidden;
}

.motion-track{
  width:100%;
  height:220px;
  background:#2c2c2c;
  border-radius:12px;
  position:relative;
  overflow:hidden;
}

.vehicle-image{
  height:200px;
  position:absolute;
  left:0;
  top:10px;
  z-index:10;
  will-change:transform;
}

.motion-trail{
  height:100%;
  background:linear-gradient(90deg,#ffd700,#ffb300);
  position:absolute;
  left:0;
  top:0;
  width:0;
  z-index:1;
  opacity:0.4;
}

.name-display{
  position:absolute;
  top:25%;
  left:5%;
  font-size:5rem;
  font-weight:700;
  letter-spacing:8px;
  display:flex;
  gap:5px;
}

.name-letter{
  opacity:0;
  color:#111;
  transition:color 0.3s ease;
}

.stat-card{
  position:absolute;
  padding:25px 35px;
  border-radius:12px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.7);
  font-size:18px;
  opacity:0;
  transform:translateY(40px);
}

.stat-value{
  font-size:48px;
  font-weight:600;
  margin-bottom:5px;
}

#statOne{top:10%;right:25%;}
#statTwo{bottom:15%;right:30%;}
#statThree{top:10%;right:8%;}
#statFour{bottom:15%;right:10%;}
</style>
</head>

<body>

<div class="scroll-wrapper">
  <div class="hero-container">
    <div class="motion-track">

      <img src="Car.png" class="vehicle-image" id="vehicle" />
      <div class="motion-trail" id="trailBar"></div>

      <div class="name-display" id="animatedName">
        <span class="name-letter">A</span>
        <span class="name-letter">B</span>
        <span class="name-letter">U</span>
        <span class="name-letter">L</span>
        <span class="name-letter">&nbsp;</span>
        <span class="name-letter">H</span>
        <span class="name-letter">A</span>
        <span class="name-letter">S</span>
        <span class="name-letter">A</span>
        <span class="name-letter">N</span>
        <span class="name-letter">&nbsp;</span>
        <span class="name-letter">F</span>
        <span class="name-letter">A</span>
        <span class="name-letter">R</span>
        <span class="name-letter">R</span>
        <span class="name-letter">U</span>
        <span class="name-letter">K</span>
        <span class="name-letter">H</span>
      </div>

    </div>

    <div class="stat-card" id="statOne">
      <div class="stat-value">58%</div>
      Increase in pickup usage
    </div>

    <div class="stat-card" id="statTwo">
      <div class="stat-value">23%</div>
      Decrease in support calls
    </div>

    <div class="stat-card" id="statThree">
      <div class="stat-value">27%</div>
      Faster delivery time
    </div>

    <div class="stat-card" id="statFour">
      <div class="stat-value">40%</div>
      Improved satisfaction
    </div>

  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

const vehicle=document.getElementById("vehicle");
const trailBar=document.getElementById("trailBar");
const nameLetters=gsap.utils.toArray(".name-letter");
const nameContainer=document.querySelector(".name-display");

const screenWidth=window.innerWidth;
const vehicleWidth=200;
const finalX=screenWidth-vehicleWidth;

const letterPositions=nameLetters.map(letter=>letter.offsetLeft);
const containerRect=nameContainer.getBoundingClientRect();

gsap.to(vehicle,{
  scrollTrigger:{
    trigger:".scroll-wrapper",
    start:"top top",
    end:"bottom top",
    scrub:1,
    pin:".hero-container"
  },
  x:finalX,
  ease:"none",
  onUpdate:function(){
    const vehicleCenter=gsap.getProperty(vehicle,"x")+vehicleWidth/2;
    nameLetters.forEach((letter,i)=>{
      const letterX=containerRect.left+letterPositions[i];
      if(vehicleCenter>=letterX){
        letter.style.opacity=1;
        letter.style.color="#FFD700";
      }else{
        letter.style.opacity=0;
        letter.style.color="#111";
      }
    });
    gsap.set(trailBar,{width:vehicleCenter});
  }
});

["#statOne","#statTwo","#statThree","#statFour"].forEach((card,index)=>{
  gsap.to(card,{
    scrollTrigger:{
      trigger:".scroll-wrapper",
      start:`top+=${400+index*200} top`,
      end:`top+=${600+index*200} top`,
      scrub:1
    },
    opacity:1,
    y:0,
    ease:"power2.out"
  });
});
</script>

</body>
</html>
